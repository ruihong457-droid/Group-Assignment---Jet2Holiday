# Exp1: Baseline

# Experiment name
experiment:
  name: exp1_baseline
  description: Baseline - CrossEntropyLoss

# Model settings
model:
  name: resnet18
  pretrained: true
  num_classes: 100

# Training settings
training:
  epochs: 50
  batch_size: 128
  learning_rate: 0.001
  num_workers: 4
  seed: 42
  data_dir: ./data

# Loss function
loss:
  type: CrossEntropyLoss

# Optimiser
optimizer:
  type: Adam
  weight_decay: 0.0001

# Early stopping
early_stopping:
  enabled: true
  patience: 10

# Output paths
paths:
  checkpoint_dir: ./checkpoints/exp1_baseline
  result_dir: ./results/exp1_baseline
