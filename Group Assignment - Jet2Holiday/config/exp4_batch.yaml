# Exp4: Batch size comparison

# Experiment name
experiment:
  name: exp4_batch
  description: Batch size sweep

# Model settings
model:
  name: resnet18
  pretrained: true
  num_classes: 100

# Training settings
training:
  epochs: 35
  batch_size: 128
  learning_rate: 0.001
  num_workers: 4
  seed: 42
  data_dir: ./data

# Batch size variants
batch_sizes:
  - 8
  - 16
  - 32
  - 64
  - 128

# Loss function (same as Exp1)
loss:
  type: CrossEntropyLoss

# Optimiser
optimizer:
  type: Adam
  weight_decay: 0.0001

# Early stopping
early_stopping:
  enabled: true
  patience: 10

# Output paths
paths:
  checkpoint_dir: ./checkpoints/exp4_batch
  result_dir: ./results/exp4_batch
