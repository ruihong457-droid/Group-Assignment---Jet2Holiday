# Exp3: Learning rate comparison

# Experiment name
experiment:
  name: exp3_lr
  description: Learning rate sweep

# Model settings
model:
  name: resnet18
  pretrained: true
  num_classes: 100

# Training settings
training:
  epochs: 35
  batch_size: 128
  learning_rate: 0.001
  num_workers: 4
  seed: 42
  data_dir: ./data

# Learning rate variants
learning_rates:
  - 0.1
  - 0.01
  - 0.001
  - 0.0001

# Loss function (same as Exp1)
loss:
  type: CrossEntropyLoss

# Optimiser
optimizer:
  type: Adam
  weight_decay: 0.0001

# Early stopping
early_stopping:
  enabled: true
  patience: 10

# Output paths
paths:
  checkpoint_dir: ./checkpoints/exp3_lr
  result_dir: ./results/exp3_lr
