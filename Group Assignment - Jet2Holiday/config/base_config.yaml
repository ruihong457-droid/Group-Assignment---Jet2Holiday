# CIFAR-100 base configuration

# Model settings
model:
  name: resnet18
  pretrained: true
  num_classes: 100
  freeze_features: false

# Training settings
training:
  epochs: 50
  batch_size: 128
  learning_rate: 0.001
  num_workers: 4
  seed: 42

# Loss function
loss:
  type: CrossEntropyLoss

# Optimiser
optimizer:
  type: Adam
  weight_decay: 0.0001

# Data settings
data:
  data_dir: ./data
  train_ratio: 0.9
  val_ratio: 0.1

# Early stopping
early_stopping:
  enabled: true
  patience: 10
  monitor: val_acc

# Output paths
paths:
  checkpoint_dir: ./checkpoints
  log_dir: ./logs
  result_dir: ./results
